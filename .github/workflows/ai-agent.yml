name: AI Agent Safe Runner

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Change eequest"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Create AI branch
        run: |
          BRANCH="ai/change-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Install AI Agent
        run: |
          pip install aider-chat

      - name: Run AI Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          aider README.md \
            --yes \
            --message "${{ inputs.prompt }}"

      - name: Commit changes
        run: |
          git config user.name "ai-agent"
          git config user.email "ai-agent@example.com"
          git status
          git add .
          git diff --cached --quiet || git commit -m "AI proposed change"

      - name: Push branch
        run: |
          git push origin "$BRANCH"

      - name: Create PR into dev
        run: |
          gh pr create \
            --base dev \
            --head "$BRANCH" \
            --title "AI proposed change" \
            --body "Prompt: ${{ inputs.prompt }}"
        env:
          GH_TOKEN: ${{ github.token }}